name: Update TieuLam Cache

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 min — GH Actions IPs not blocked by Cloudflare
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch TieuLam data
        env:
          TIEULAM_FRONTEND: ${{ vars.TIEULAM_FRONTEND }}
          TIEULAM_API_BASE: ${{ vars.TIEULAM_API_BASE }}
        run: python .github/scripts/fetch_tieulam.py

      - name: Commit and push cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tieulam_cache.json
          if git diff --cached --quiet; then
            echo "No changes — cache already up to date"
          else
            MATCH_COUNT=$(python3 -c "import json; d=json.load(open('data/tieulam_cache.json')); print(d.get('count',0))")
            git commit -m "chore: TieuLam cache — ${MATCH_COUNT} matches ($(date -u '+%H:%M UTC %d/%m/%Y'))"
            git push
          fi
