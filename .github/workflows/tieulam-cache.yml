name: TieuLam Cache Refresh

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Fetch TieuLam data (tinhlagi.pro)
        run: python scripts/fetch_tieulam_cache.py

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tieulam_cache.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "chore: refresh TieuLam cache (tinhlagi.pro) [skip ci]"
            git push
          )
